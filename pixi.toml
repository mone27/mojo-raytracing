[workspace]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "ray-tracer"
platforms = ["linux-64"]
version = "0.1.0"


[system-requirements]
linux = "4.18"
libc = { family = "glibc", version = "2.34" }


[tasks]
run = "mojo src/main.mojo"
test = "mojo test -I src tests/"

[dependencies]
jupyterlab = ">=4.5.5,<5"
mojo = "*"
max = ">=26.2.0.dev2026022605,<27"
modular = ">=26.2.0.dev2026022605,<27"

